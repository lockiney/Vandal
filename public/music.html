<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vandal - Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Permanent Marker', cursive;
            background: #0a0a0f;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 16px;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .topbar-title {
            font-size: 22px;
            background: linear-gradient(135deg, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        /* MAIN LAYOUT */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        /* LEFT PANEL - Player */
        .player-panel {
            width: 340px;
            min-width: 340px;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.02);
            border-right: 1px solid rgba(255,255,255,0.06);
        }

        .album-art-wrap {
            position: relative;
            padding: 24px 24px 0;
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            display: none;
        }

        .album-art.has-art { font-size: 0; }
        .album-art.has-art img { display: block; }

        .track-info {
            padding: 16px 24px 0;
        }

        .track-name {
            font-size: 18px;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .track-artist {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preview-badge {
            display: inline-block;
            font-size: 10px;
            background: rgba(192,132,252,0.15);
            color: #c084fc;
            border: 1px solid rgba(192,132,252,0.3);
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 6px;
        }

        /* PROGRESS */
        .progress-wrap {
            padding: 16px 24px 0;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a78bfa, #c084fc);
            border-radius: 2px;
            width: 0%;
            transition: width 0.5s linear;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            margin-top: 6px;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 16px 24px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover { color: white; transform: scale(1.1); }

        .play-btn {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a78bfa, #c084fc);
            color: white;
            font-size: 20px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(167,139,250,0.4);
        }

        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(167,139,250,0.6); }

        /* VOLUME */
        .volume-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 24px 20px;
        }

        .vol-icon { font-size: 16px; color: rgba(255,255,255,0.4); }

        .vol-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #a78bfa;
            cursor: pointer;
        }

        /* RIGHT PANEL - Search */
        .search-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .search-bar-wrap {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            gap: 10px;
        }

        .search-bar-wrap input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(167,139,250,0.3);
            border-radius: 10px;
            padding: 10px 16px;
            color: white;
            font-family: 'Permanent Marker', cursive;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .search-bar-wrap input:focus {
            border-color: #a78bfa;
            background: rgba(167,139,250,0.08);
        }

        .search-bar-wrap input::placeholder { color: rgba(255,255,255,0.3); }

        .search-go {
            background: linear-gradient(135deg, #a78bfa, #c084fc);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            color: white;
            font-family: 'Permanent Marker', cursive;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-go:hover { opacity: 0.9; transform: scale(1.02); }

        /* RESULTS */
        .results {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .results::-webkit-scrollbar { width: 4px; }
        .results::-webkit-scrollbar-track { background: transparent; }
        .results::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 2px; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.2);
            gap: 12px;
        }

        .empty-state .icon { font-size: 48px; }
        .empty-state p { font-size: 14px; }

        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
        }

        .result-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(167,139,250,0.2);
        }

        .result-item.playing {
            background: rgba(167,139,250,0.1);
            border-color: rgba(167,139,250,0.4);
        }

        .result-thumb {
            width: 48px; height: 48px;
            border-radius: 8px;
            object-fit: cover;
            background: rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .result-info { flex: 1; min-width: 0; }

        .result-name {
            font-size: 14px;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-artist {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .result-duration {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        .playing-indicator {
            font-size: 16px;
            color: #a78bfa;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: rgba(255,255,255,0.3);
            gap: 12px;
        }

        .spinner {
            width: 24px; height: 24px;
            border: 2px solid rgba(167,139,250,0.2);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .main { flex-direction: column; }
            .player-panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
            .album-art { height: 200px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <a href="/" class="back-btn">← Back</a>
    <div class="topbar-title">🎵 VANDAL MUSIC</div>
</div>

<div class="main">
    <!-- Player Panel -->
    <div class="player-panel">
        <div class="album-art-wrap">
            <div class="album-art" id="albumArt">
                🎵
                <img id="albumImg" src="" alt="Album Art">
            </div>
        </div>

        <div class="track-info">
            <div class="track-name" id="trackName">Not Playing</div>
            <div class="track-artist" id="trackArtist">Search for a song on the right</div>
            <span class="preview-badge" id="previewBadge" style="display:none;">30s Preview</span>
        </div>

        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar" onclick="seekTo(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-row">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" onclick="skipPrev()" title="Previous">⏮</button>
            <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="ctrl-btn" onclick="skipNext()" title="Next">⏭</button>
        </div>

        <div class="volume-row">
            <span class="vol-icon">🔈</span>
            <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
            <span class="vol-icon">🔊</span>
        </div>
    </div>

    <!-- Search Panel -->
    <div class="search-panel">
        <div class="search-bar-wrap">
            <input type="text" id="searchInput" placeholder="Search any song..." onkeydown="if(event.key==='Enter') doSearch()">
            <button class="search-go" onclick="doSearch()">🔍 Search</button>
        </div>
        <div class="results" id="results">
            <div class="empty-state">
                <div class="icon">🎵</div>
                <p>Search for any song to start listening</p>
            </div>
        </div>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script>
    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const progressFill = document.getElementById('progressFill');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const albumArt = document.getElementById('albumArt');
    const albumImg = document.getElementById('albumImg');

    let tracks = [];
    let currentIndex = -1;
    let isPlaying = false;

    function formatTime(secs) {
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = pct + '%';
        currentTimeEl.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
        totalTimeEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('ended', () => {
        skipNext();
    });

    audio.addEventListener('play', () => {
        isPlaying = true;
        playBtn.textContent = '⏸';
    });

    audio.addEventListener('pause', () => {
        isPlaying = false;
        playBtn.textContent = '▶';
    });

    function togglePlay() {
        if (currentIndex === -1) return;
        if (isPlaying) audio.pause();
        else audio.play();
    }

    function seekTo(e) {
        if (!audio.duration) return;
        const bar = document.getElementById('progressBar');
        const rect = bar.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
    }

    function setVolume(v) {
        audio.volume = v;
    }

    function playTrack(index) {
        if (index < 0 || index >= tracks.length) return;
        currentIndex = index;
        const track = tracks[index];

        document.getElementById('trackName').textContent = track.trackName || track.collectionName;
        document.getElementById('trackArtist').textContent = track.artistName;
        document.getElementById('previewBadge').style.display = 'inline-block';

        if (track.artworkUrl100) {
            const hqArt = track.artworkUrl100.replace('100x100', '400x400');
            albumImg.src = hqArt;
            albumImg.onload = () => albumArt.classList.add('has-art');
            albumImg.onerror = () => albumArt.classList.remove('has-art');
        } else {
            albumArt.classList.remove('has-art');
        }

        audio.src = track.previewUrl;
        audio.play();

        // Update results UI
        document.querySelectorAll('.result-item').forEach((el, i) => {
            el.classList.toggle('playing', i === index);
            const ind = el.querySelector('.playing-indicator');
            if (ind) ind.style.display = i === index ? 'block' : 'none';
        });
    }

    function skipNext() {
        if (currentIndex < tracks.length - 1) playTrack(currentIndex + 1);
    }

    function skipPrev() {
        if (audio.currentTime > 3) {
            audio.currentTime = 0;
        } else if (currentIndex > 0) {
            playTrack(currentIndex - 1);
        }
    }

    async function doSearch() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return;

        const results = document.getElementById('results');
        results.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><span>Searching...</span></div>`;

        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=30`);
            const data = await res.json();
            tracks = data.results.filter(t => t.previewUrl);

            if (!tracks.length) {
                results.innerHTML = `<div class="empty-state"><div class="icon">😕</div><p>No results found</p></div>`;
                return;
            }

            results.innerHTML = '';
            tracks.forEach((track, i) => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.onclick = () => playTrack(i);

                const duration = Math.floor(track.trackTimeMillis / 1000);

                item.innerHTML = `
                    <img class="result-thumb" src="${track.artworkUrl60 || ''}" alt="${track.trackName}" onerror="this.style.background='rgba(167,139,250,0.1)'">
                    <div class="result-info">
                        <div class="result-name">${track.trackName || track.collectionName}</div>
                        <div class="result-artist">${track.artistName} • ${track.collectionName || ''}</div>
                    </div>
                    <span class="result-duration">${formatTime(duration)}</span>
                    <span class="playing-indicator" style="display:none;">♪</span>
                `;
                results.appendChild(item);
            });
        } catch (err) {
            results.innerHTML = `<div class="empty-state"><div class="icon">😕</div><p>Search failed — try again</p></div>`;
        }
    }
</script>
</body>
</html>
