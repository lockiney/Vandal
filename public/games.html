<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vandal - Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Permanent Marker', cursive;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            background: radial-gradient(ellipse at top, rgba(167,139,250,0.15) 0%, transparent 70%);
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .hero-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            filter: drop-shadow(0 0 20px rgba(192,132,252,0.6));
        }

        .hero-title {
            font-size: 52px;
            background: linear-gradient(135deg, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .refresh-hint {
    display: inline-block;
    color: #a78bfa;
    font-size: 14px;
    margin-bottom: 24px;
    cursor: pointer;
    border: none;
    border-bottom: 1px dashed rgba(167,139,250,0.5);
    font-family: 'Permanent Marker', cursive;
    background: none;
    padding-bottom: 2px;
    transition: all 0.2s;
}
.refresh-hint:hover { color: #c084fc; border-bottom-color: #c084fc; }
.refresh-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10001; align-items: center; justify-content: center; }
.refresh-popup.active { display: flex; }
.refresh-box { background: #1a1a2e; border: 1px solid rgba(167,139,250,0.3); border-radius: 16px; padding: 28px; max-width: 420px; width: 90%; }
.refresh-box h3 { color: #a78bfa; font-size: 20px; margin-bottom: 20px; text-align: center; }
.refresh-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.06); }
.refresh-item .platform { color: rgba(255,255,255,0.6); font-size: 14px; }
.refresh-item .shortcut { background: rgba(167,139,250,0.15); color: #a78bfa; padding: 6px 14px; border-radius: 8px; font-size: 14px; border: 1px solid rgba(167,139,250,0.3); }
.refresh-close { display: block; width: 100%; margin-top: 16px; padding: 12px; background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); border-radius: 10px; color: #a78bfa; font-family: 'Permanent Marker', cursive; font-size: 15px; cursor: pointer; transition: all 0.2s; }
.refresh-close:hover { background: rgba(167,139,250,0.25); }

        .search-wrap {
            max-width: 560px;
            margin: 0 auto 16px;
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            padding: 16px 24px 16px 50px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(167,139,250,0.3);
            border-radius: 50px;
            color: white;
            font-family: 'Permanent Marker', cursive;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-wrap input:focus {
            border-color: #a78bfa;
            background: rgba(167,139,250,0.1);
            box-shadow: 0 0 20px rgba(167,139,250,0.2);
        }

        .search-wrap input::placeholder { color: rgba(255,255,255,0.35); }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 18px;
            pointer-events: none;
        }

        .tags-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 700px;
            margin: 0 auto 16px;
            padding: 0 20px;
        }

        .tag {
            padding: 6px 16px;
            border-radius: 50px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
            font-family: 'Permanent Marker', cursive;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag:hover, .tag.active {
            background: rgba(167,139,250,0.2);
            border-color: #a78bfa;
            color: #a78bfa;
        }

        .sort-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 0 20px 20px;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 8px 20px;
            border-radius: 50px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            font-family: 'Permanent Marker', cursive;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-btn:hover, .sort-btn.active {
            background: rgba(192,132,252,0.15);
            border-color: #c084fc;
            color: #c084fc;
        }

        main { padding: 0 24px 60px; max-width: 1400px; margin: 0 auto; }

        .section-title {
            font-size: 22px;
            color: rgba(255,255,255,0.85);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            letter-spacing: 2px;
        }

        .section-title span {
            color: #a78bfa;
            font-size: 16px;
            margin-left: 10px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .game-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: rgba(167,139,250,0.4);
            box-shadow: 0 12px 30px rgba(167,139,250,0.15);
        }

        .game-card img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
            background: rgba(255,255,255,0.05);
        }

        .game-card-name {
            padding: 10px 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.85);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-card .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(167,139,250,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 36px;
        }

        .game-card:hover .play-overlay { opacity: 1; }

        #zoneViewer {
            display: none;
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            z-index: 9999;
            flex-direction: column;
        }

        #zoneViewer.active { display: flex; }

        .zone-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            gap: 12px;
            flex-wrap: wrap;
        }

        .zone-info { display: flex; align-items: center; gap: 12px; }
        .zone-title-text { font-size: 18px; color: #a78bfa; }
        .zone-author { font-size: 13px; color: rgba(255,255,255,0.4); }
        .zone-controls { display: flex; gap: 8px; flex-wrap: wrap; }

        .zone-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: white;
            font-family: 'Permanent Marker', cursive;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .zone-btn:hover { background: rgba(167,139,250,0.2); border-color: #a78bfa; }
        .zone-btn.close { border-color: rgba(255,80,80,0.4); }
        .zone-btn.close:hover { background: rgba(255,80,80,0.2); border-color: #ff5050; }

        #zoneFrame { flex: 1; border: none; width: 100%; }

        #popupOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        #popupOverlay.active { display: flex; }

        .popup {
            background: #1a1a2e;
            border: 1px solid rgba(167,139,250,0.3);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .popup-header h3 { color: #a78bfa; font-size: 18px; }

        .popup-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 24px;
            cursor: pointer;
        }

        .popup-close:hover { color: white; }

        .loading {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.3);
            font-size: 18px;
        }

        .loading::after {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(167,139,250,0.2);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 16px auto 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .no-results {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.3);
            font-size: 16px;
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        footer a {
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        footer a:hover { color: #a78bfa; }

        @media (max-width: 600px) {
            .hero-title { font-size: 36px; }
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <a href="/" class="back-btn">← Back</a>
    <img src="/logo.png" alt="Vandal" class="hero-logo" onerror="this.style.display='none'">
    <div class="hero-title">VANDAL GAMES</div>
    <button class="refresh-hint" onclick="document.getElementById('refreshPopup').classList.add('active')">🔄 If games don't load, hard refresh</button>

    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchBar" placeholder="Search games..." oninput="filterZones()">
    </div>

    <div class="tags-row" id="tagsRow"></div>

    <div class="sort-bar">
        <button class="sort-btn active" onclick="setSort('name', this)">Name</button>
        <button class="sort-btn" onclick="setSort('id', this)">Newest</button>
        <button class="sort-btn" onclick="setSort('popular', this)">Popular</button>
        <button class="sort-btn" onclick="setSort('trendingWeek', this)">Trending</button>
    </div>
</div>

<main>
    <div id="featuredSection">
        <div class="section-title">⭐ Featured <span id="featuredCount"></span></div>
        <div class="game-grid" id="featuredZones"></div>
    </div>

    <div class="section-title">🎮 All Games <span id="allCount"></span></div>
    <div class="game-grid" id="container"><div class="loading">Loading games</div></div>
</main>

<footer>
    <a href="#" onclick="loadDMCA(); return false;">DMCA</a>
    <a href="#" onclick="showContact(); return false;">Contact</a>
    <a href="#" onclick="loadPrivacy(); return false;">Privacy Policy</a>
    <a href="javascript:saveData()">Export Save</a>
    <a href="#" onclick="document.getElementById('importData').click(); return false;">Import Save</a>
    <input type="file" id="importData" style="display:none;" onchange="loadData(event)">
</footer>

<div id="zoneViewer">
    <div class="zone-topbar">
        <div class="zone-info">
            <span class="zone-title-text" id="zoneName">Game</span>
            <span class="zone-author" id="zoneAuthorDisplay"></span>
            <span id="zoneId" style="display:none;"></span>
        </div>
        <div class="zone-controls">
            <button class="zone-btn" onclick="fullscreenZone()">⛶ Fullscreen</button>
            <button class="zone-btn" onclick="aboutBlank()">↗ New Tab</button>
            <button class="zone-btn" onclick="downloadZone()">⬇ Download</button>
            <button class="zone-btn close" onclick="closeZone()">✕ Close</button>
        </div>
    </div>
    <iframe id="zoneFrame"></iframe>
</div>

<div id="popupOverlay">
    <div class="popup">
        <div class="popup-header">
            <h3 id="popupTitle">Info</h3>
            <button class="popup-close" onclick="closePopup()">×</button>
        </div>
        <div id="popupBody"></div>
    </div>
</div>

<script>
const container = document.getElementById('container');
const zoneViewer = document.getElementById('zoneViewer');
let zoneFrame = document.getElementById('zoneFrame');
const searchBar = document.getElementById('searchBar');
const zonesurls = [
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@master/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets/zones.json"
];
let zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
const coverURL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
const htmlURL = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";
let zones = [];
let popularityData = {};
let currentSort = 'name';
let currentTag = null;

function toTitleCase(str) {
    return str.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substring(1).toLowerCase());
}

function setSort(sort, btn) {
    currentSort = sort;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortZones();
}

async function listZones() {
    try {
        try {
            const sharesponse = await fetch("https://api.github.com/repos/freebuisness/assets/commits?t=" + Date.now());
            if (sharesponse && sharesponse.status === 200) {
                const shajson = await sharesponse.json();
                const sha = shajson[0]['sha'];
                if (sha) zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
            }
        } catch (e) {}

        const response = await fetch(zonesURL + "?t=" + Date.now());
        const json = await response.json();
        zones = json;
        zones[0].featured = true;
        await Promise.all([fetchPopularity("year"), fetchPopularity("month"), fetchPopularity("week"), fetchPopularity("day")]);

        let alltags = [];
        for (const obj of json) {
            if (Array.isArray(obj.special)) alltags.push(...obj.special);
        }
        alltags = [...new Set(alltags)];
        const tagsRow = document.getElementById('tagsRow');
        alltags.forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag';
            btn.textContent = toTitleCase(tag);
            btn.onclick = () => {
                if (currentTag === tag) {
                    currentTag = null;
                    btn.classList.remove('active');
                } else {
                    currentTag = tag;
                    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                }
                filterZones();
            };
            tagsRow.appendChild(btn);
        });

        sortZones();

        try {
            const search = new URLSearchParams(window.location.search);
            const id = search.get('id');
            if (id) {
                const zone = zones.find(z => z.id + '' == id + '');
                if (zone) openZone(zone);
            }
        } catch(e) {}
    } catch (error) {
        console.error(error);
        container.innerHTML = `<div class="no-results">Failed to load games 😕</div>`;
    }
}

async function fetchPopularity(duration) {
    try {
        if (!popularityData[duration]) popularityData[duration] = {};
        const response = await fetch("https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files?period=" + duration);
        const data = await response.json();
        data.forEach(file => {
            const idMatch = file.name.match(/\/(\d+)\.html$/);
            if (idMatch) popularityData[duration][parseInt(idMatch[1])] = file.hits?.total ?? 0;
        });
    } catch (e) {
        if (!popularityData[duration]) popularityData[duration] = {};
    }
}

function sortZones() {
    let sorted = [...zones];
    if (currentSort === 'name') sorted.sort((a, b) => a.name.localeCompare(b.name));
    else if (currentSort === 'id') sorted.sort((a, b) => b.id - a.id);
    else if (currentSort === 'popular') sorted.sort((a, b) => ((popularityData['year']?.[b.id]) ?? 0) - ((popularityData['year']?.[a.id]) ?? 0));
    else if (currentSort === 'trendingWeek') sorted.sort((a, b) => ((popularityData['week']?.[b.id]) ?? 0) - ((popularityData['week']?.[a.id]) ?? 0));

    const featured = zones.filter(z => z.featured);
    displayFeaturedZones(featured);
    displayZones(sorted);
}

function filterZones() {
    const query = searchBar.value.toLowerCase();
    let filtered = zones.filter(z => z.name.toLowerCase().includes(query));
    if (currentTag) filtered = filtered.filter(z => z.special?.includes(currentTag));
    if (query || currentTag) {
        document.getElementById('featuredSection').style.display = 'none';
    } else {
        document.getElementById('featuredSection').style.display = 'block';
    }
    displayZones(filtered);
}

function makeCard(file) {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.onclick = () => openZone(file);

    const img = document.createElement('img');
    img.dataset.src = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
    img.alt = file.name;
    img.onerror = () => { img.style.background = 'rgba(167,139,250,0.1)'; };

    const overlay = document.createElement('div');
    overlay.className = 'play-overlay';
    overlay.textContent = '▶';

    const name = document.createElement('div');
    name.className = 'game-card-name';
    name.textContent = file.name;

    card.appendChild(img);
    card.appendChild(overlay);
    card.appendChild(name);
    return card;
}

function lazyLoad(cont) {
    const imgs = cont.querySelectorAll('img[data-src]');
    const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.src = entry.target.dataset.src;
                delete entry.target.dataset.src;
                obs.unobserve(entry.target);
            }
        });
    }, { rootMargin: '100px' });
    imgs.forEach(img => observer.observe(img));
}

function displayFeaturedZones(featured) {
    const fc = document.getElementById('featuredZones');
    fc.innerHTML = '';
    featured.forEach(f => fc.appendChild(makeCard(f)));
    document.getElementById('featuredCount').textContent = `(${featured.length})`;
    lazyLoad(fc);
}

function displayZones(list) {
    container.innerHTML = '';
    if (!list.length) {
        container.innerHTML = '<div class="no-results">No games found 😕</div>';
        return;
    }
    list.forEach(f => container.appendChild(makeCard(f)));
    document.getElementById('allCount').textContent = `(${list.length})`;
    lazyLoad(container);
}

function openZone(file) {
    if (file.url.startsWith("http")) { window.open(file.url, "_blank"); return; }
    const url = file.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
    fetch(url + "?t=" + Date.now()).then(r => r.text()).then(html => {
        if (zoneFrame.contentDocument === null) {
            zoneFrame = document.createElement("iframe");
            zoneFrame.id = "zoneFrame";
            zoneViewer.appendChild(zoneFrame);
        }
        zoneFrame.contentDocument.open();
        zoneFrame.contentDocument.write(html);
        zoneFrame.contentDocument.close();
        document.getElementById('zoneName').textContent = file.name;
        document.getElementById('zoneId').textContent = file.id;
        document.getElementById('zoneAuthorDisplay').textContent = file.author ? 'by ' + file.author : '';
        zoneViewer.classList.add('active');
        try {
            const u = new URL(window.location);
            u.searchParams.set('id', file.id);
            history.pushState(null, '', u.toString());
        } catch(e) {}
    }).catch(err => alert("Failed to load game: " + err));
}

function closeZone() {
    zoneViewer.classList.remove('active');
    try {
        const u = new URL(window.location);
        u.searchParams.delete('id');
        history.pushState(null, '', u.toString());
    } catch(e) {}
}

function fullscreenZone() {
    if (zoneFrame.requestFullscreen) zoneFrame.requestFullscreen();
    else if (zoneFrame.webkitRequestFullscreen) zoneFrame.webkitRequestFullscreen();
}

function aboutBlank() {
    const newWindow = window.open("about:blank", "_blank");
    const id = document.getElementById('zoneId').textContent;
    const zone = zones.find(z => z.id + '' === id + '');
    if (!zone) return;
    fetch(zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL) + "?t=" + Date.now())
        .then(r => r.text()).then(html => {
            if (newWindow) { newWindow.document.open(); newWindow.document.write(html); newWindow.document.close(); }
        });
}

function downloadZone() {
    const id = document.getElementById('zoneId').textContent;
    const zone = zones.find(z => z.id + '' === id + '');
    if (!zone) return;
    fetch(zone.url.replace("{HTML_URL}", htmlURL) + "?t=" + Date.now()).then(r => r.text()).then(text => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([text], { type: "text/plain;charset=utf-8" }));
        a.download = zone.name + ".html";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });
}

function closePopup() { document.getElementById('popupOverlay').classList.remove('active'); }

function showContact() {
    document.getElementById('popupTitle').textContent = "Contact";
    document.getElementById('popupBody').innerHTML = `<p style="color:rgba(255,255,255,0.7);line-height:1.8;">For game removal requests, contact the original GN-Math team via their Discord.</p>`;

async function saveData() {
    const result = { cookies: document.cookie, localStorage: {...localStorage}, sessionStorage: {...sessionStorage} };
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([JSON.stringify(result)], { type: "application/octet-stream" }));
    link.download = `vandal-save-${Date.now()}.data`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

async function loadData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const data = JSON.parse(e.target.result);
        if (data.cookies) data.cookies.split(';').forEach(c => document.cookie = c.trim());
        if (data.localStorage) for (const k in data.localStorage) localStorage.setItem(k, data.localStorage[k]);
        alert("Save data loaded!");
    };
    reader.readAsText(file);
}
